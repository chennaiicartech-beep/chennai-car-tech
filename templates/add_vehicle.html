<!DOCTYPE html>
<html>

<head>

    <title>Add Vehicle - CHENNAI CAR-TECH</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-container">

    <h1>
        <span style="color:#32CD32;">CHENNAI</span>
        <span style="color:#006400;">CAR-TECH</span>
    </h1>

    <h2>🚗 Add Vehicle</h2>

    <form method="POST">

        <input
        type="text"
        name="reg"
        placeholder="Vehicle Registration Number"
        required>

        <br><br>

        <input
        type="text"
        name="model"
        placeholder="Vehicle Model"
        required>

        <br><br>

        <input
        type="text"
        name="odo"
        placeholder="Odometer Reading"
        required>

        <br><br>

        <input
        type="date"
        name="last"
        required>

        <br><br>

        

        <button type="submit">
            Save Vehicle
        </button>

    </form>

    <br>

    <a href="/dashboard" class="back-btn">
        ← Back to Dashboard
    </a>

</div>

</body>

</html>
