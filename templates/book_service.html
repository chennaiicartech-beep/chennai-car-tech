<!DOCTYPE html>
<html>

<head>

    <title>Book Service</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-container">

    <h1>
        <span style="color:#32CD32;">CHENNAI</span>
        <span style="color:#006400;">CAR-TECH</span>
    </h1>

    <h2>⚡ Book Service</h2>

    <form method="POST">

        <label>Service Type</label>

        <select name="service" required>

            <option value="General Service">
                General Service
            </option>

            <option value="Oil Change">
                Oil Change
            </option>

            <option value="Wheel Alignment">
                Wheel Alignment
            </option>

            <option value="Brake Service">
                Brake Service
            </option>

            <option value="Full Inspection">
                Full Inspection
            </option>

        </select>

        <br><br>

        <label>Preferred Date</label>

        <input
        type="date"
        name="date"
        required>

        <br><br>

        <button type="submit">

            Book Service

        </button>
       


    </form>

    <br>

    <a href="/dashboard" class="back-btn">

        ← Back to Dashboard

    </a>

</div>

</body>

</html>
