<div class="container">

<div class="form-container">

<h2>💰 Create Estimate</h2>

<form method="POST">

<label>Parts Cost (₹)</label>

<input
type="number"
step="0.01"
name="parts_cost"
required>

<label>Labour Cost (₹)</label>

<input
type="number"
step="0.01"
name="labour_cost"
required>

<label>Taxes (₹)</label>

<input
type="number"
step="0.01"
name="taxes"
required>

<label>Notes</label>

<textarea
name="notes"
rows="5">
</textarea>

<button type="submit">
💰 Generate Estimate
</button>

</form>

</div>
