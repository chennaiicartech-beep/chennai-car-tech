<!DOCTYPE html>
<html>

<head>

    <title>CHENNAI CAR-TECH Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="login-container">

    <img
    src="{{ url_for('static', filename='images/logo.jpg') }}"
    width="120">

    <h1>
        <span style="color:#32CD32;">CHENNAI</span>
        <span style="color:#006400;">CAR-TECH</span>
    </h1>

    <h3>Create Customer Account</h3>

    <form method="POST">

        <input
        type="text"
        name="name"
        placeholder="Full Name"
        required>

        <br><br>

        <input
        type="email"
        name="email"
        placeholder="Email"
        required>

        <br><br>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/" class="register-btn">
        Back to Login
    </a>

</div>

</body>
</html>
